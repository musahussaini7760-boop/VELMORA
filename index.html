<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VELMORA - Luxury Fashion E-commerce</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Header Section -->
    <header>
        <div class="logo">
            <img src="gold-3d-logo.png" alt="VELMORA Logo">
        </div>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <h1>Welcome to VELMORA</h1>
        <p>Your destination for luxury fashion.</p>
        <a href="#featured-products" class="btn">Shop Now</a>
    </section>

    <!-- Featured Products Section -->
    <section class="featured-products" id="featured-products">
        <h2>Featured Products</h2>
        <div class="products">
            <!-- Example product cards -->
            <div class="product-card">
                <img src="product1.jpg" alt="Product 1">
                <h3>Product Name 1</h3>
                <p>$100.00</p>
                <a href="#" class="btn">Add to Cart</a>
            </div>
            <div class="product-card">
                <img src="product2.jpg" alt="Product 2">
                <h3>Product Name 2</h3>
                <p>$150.00</p>
                <a href="#" class="btn">Add to Cart</a>
            </div>
            <!-- Add more products as needed -->
        </div>
    </section>

    <!-- Call to Action Section -->
    <section class="call-to-action">
        <h2>Join Our Newsletter</h2>
        <p>Subscribe for exclusive offers and updates.</p>
        <a href="#" class="btn">Subscribe</a>
    </section>

    <!-- Footer Section -->
    <footer>
        <p>&copy; 2026 VELMORA. All rights reserved.</p>
    </footer>
</body>
</html>
